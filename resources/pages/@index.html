<x:main>
    <set page:data="pages/index" />
    <header>
        <hgroup>
            <h1>
                Hello, my name is <span class="text-olive font-semibold">Matthew Sahagian</span>.
            </h1>
            <h2>
                I solve technical problems.
            </h2>
        </hgroup>
        <section class="flex flex-col @xl:flex-row! @xl:items-center gap-8" aria-label="Introduction">
            <div class="align-text-top">
                <markdown>
                    {{ page.intro }}
                </markdown>
            </div>
            <div class="flex justify-center @xl:justify-start items-start gap-4">
                <x:button:main url="https://github.com/mattsah">
                    View GitHub <x:icon class:="ml-2" name="move-right" />
                </x:button:main>
                <x:button class:="bg-zinc-800 text-fore!" url="/resume?print=true">
                    Print Resume <x:icon class:="ml-2" name="printer" />
                </x:button>
            </div>
        </section>
    </header>
    <section class="grid @md:grid-cols-3 gap-8">
        <x:list:stats class:="@md:col-span-1 bg-olive/5 text-olive w-full" data:val="(
            'Technical Experience': '20+ Years',
            'Open Source Repositories': '80+'
        )" />
        <section class="@md:col-span-2" aria-label="My Projects">
            <markdown>
                {{ page.about }}
            </markdown>
            <x:button:ghost class:="float-right" url="/about">
                Learn More About Me
            </x:button:ghost>
        </section>
    </section>
    <section class="grid @md:grid-cols-12 gap-8 bg-black/20">
        <section class="@lg:col-span-7">
            <set projects:data="projects" />
            <h2 class="text-2xl">Projects</h2>
            <ul>
                <for key="id" val="project" in:val="projects.slice(0, 4)">
                    <li>
                        <a class="block" href="/projects/{{ id }}">
                            <span class="text-coral">{{ project.title }}</span>: {{ project.tagline ? '' }}
                        </a>
                    </li>
                </for>
            </ul>
        </section>
        <section class="@lg:col-span-5 bg-black/20 p-4 -mt-4 -mb-4">
            <h2 class="text-2xl">Contact</h2>
            <x:form:contact />
        </section>
    </section>
</x:main>
