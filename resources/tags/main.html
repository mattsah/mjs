<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>{{ title ? (title + ' - Matthew Sahagian - Porfolio') : 'Matthew Sahagian - Portfolio' }}</title>

        <script defer src="https://cdn.jsdelivr.net/npm/alpinejs-masonry@1.0.16/dist/masonry.min.js" />
        <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" />
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous" />

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" />

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/nord.min.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/nim.min.js" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/twig.min.js" />

        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js" />

        <script src="/scripts/utility.js" />

        <link rel="stylesheet" href="/styles/tailwind.css" />

        <style>
            @media print {
                @page {
                    size: auto;
                    margin: 0;
                    padding: 0;
                }

                html {
                    padding: 0;
                    margin: .25in;
                    font-size: 10pt;
                }

                #bmc-wbtn,
                #bmc-wbtn + div {
                    display: none !important;
                }
            }

            * {
                -webkit-print-color-adjust: exact !important;
                color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        </style>
    </head>
    <body class="relative h-full flex flex-col" hx-boost="true" hx-target="#main" hx-select="#main" hx-swap="outerHTML show:window:top">
        <header class="print:hidden">
            <x:nav />
        </header>
        <main class="bg-white/3" id="main" x-data>
            <x class:="contain py-8">
                <raw>
                    {{ children ? '' }}
                </raw>
            </x>
        </main>
        <footer class="print:hidden bg-black/50 grow contain py-8 text-center text-fore">
            &copy; {{ 'now'.date('YYYY') }} Matthew J. Sahagian.  All Rights Reserved.
        </footer>
        <script data-name="BMC-Widget" data-cfasync="false" src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js" data-id="mattsah" data-description="Support me on Buy me a coffee!" data-message="If you find the things I'm working on useful, you can buy me a coffee." data-color="#FF5F5F" data-position="Right" data-x_margin="18" data-y_margin="18"></script>
    </body>
</html>
