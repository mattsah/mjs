intro: |
  I am a self-taught, open-source-friendly, <em>technical architect and senior programmer</em> for web-based applications with a background in developer operations and system administration.

about: |
  My technical career spans everything from computer repair to systems design and application architecture.  While I'm currently *seeking new opportunities*, I remain a fractional member at [Primd Cooperative](https://primd.app) and continue to develop and maintain the [Hiraeth Nano-Framework](https://hiraeth.dev) used in over a dozen production deployments.  In my spare time, I like working on various [Nim](https://nim-lang.org/) projects (including the framework for this site).

